server:
  servlet:
    context-path: / # 上下文路径
  port: 80   # 端口号设置
  tomcat:
    max-connections: 10000 # 最大连接数
    threads:
      max: 800 # 最大工作线程数
      min-spare: 100 # 最小空闲线程数
    accept-count: 100 # 等待队列长度
    connection-timeout: 20000

spring:
  # 禁用 banner
  main:
    banner-mode: off
  threads:
    virtual:
      enabled: true
#  task:
#    execution:
#      pool:
#        core-size: 8 # cpu密集型设置cpu核心数，io密集型则设置为cpu核心数的2-3倍
#        max-size: 16
#        queue-capacity: 100
#        keep-alive: 60s
#      thread-name-prefix: async-task-
#    scheduling:
#      pool:
#        size: 4
#      thread-name-prefix: scheduling-
  servlet:
    multipart:
      max-file-size: 5GB  # 最大上传文件大小
      max-request-size: 5130MB # 最大请求体大小（建议比最大上传文件大小大10MB)
      file-size-threshold: 2KB
      resolve-lazily: false
    encoding:
      force: true
  jackson:
    # 设置时区
    time-zone: GMT+8
    # 设置时间格式
    date-format: yyyy-MM-dd HH:mm:ss
    # 设置语言
    locale: CHINESE
    mapper:
      # 不区分枚举名称大小写
      accept-case-insensitive-enums: true

pangju:
  task:
    execution:
      once:
        async-initial-capacity: 64
        sync-initial-capacity: 64
  web:
    exception:
      statistics:
        enabled: true
        endpoints:
          list: /exception/list
          types: /exception/types
  jackson:
    write-bigdecimal-as-plain: true
    write-date-as-timestamps: true
    write-instant-as-timestamp: true

logging:
  config: classpath:logback/local.xml
  #config: classpath:log4j2/local.yml
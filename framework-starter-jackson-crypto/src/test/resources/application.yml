spring:
  # 禁用 banner
  main:
    banner-mode: off
  threads:
    virtual:
      enabled: true
  jackson:
    # 设置时区
    time-zone: GMT+8
    # 设置时间格式
    date-format: yyyy-MM-dd HH:mm:ss
    # 设置语言
    locale: CHINESE
    mapper:
      # 不区分枚举名称大小写
      accept-case-insensitive-enums: true

pangju:
  jackson:
    write-bigdecimal-as-plain: true
    write-date-as-timestamps: true
    write-instant-as-timestamp: true

logging:
  config: classpath:logback/local.xml
  #config: classpath:log4j2/local.yml